# =============================================================================
# E.ON Meter – Home Assistant Dashboard – Példa konfiguráció
# =============================================================================
#
# Használat:
#   1. Settings → Dashboards → (válassz egyet) → Edit Dashboard → Raw YAML
#   2. Illeszd be az alábbi views szekciót.
#
# Entitás ID-k meghatározása:
#   Settings → Devices & Services → E.ON Meter → Entities listában látod
#   a tényleges entity_id-ket. A HA a device nevéből + sensor nevéből képzi,
#   pl. "E.ON Meter HU0001234567" + "Import Daily" →
#       sensor.e_on_meter_hu0001234567_import_daily
#
#   Ajánlott: a ${POD} helyére írd be az eszközneved slug-ját, pl:
#     sensor.e_on_meter_hu0001234567_import_daily
#
# Telepítendő HACS frontend kiegészítők:
#   - custom:mini-graph-card        → HACS: mini-graph-card
#   - custom:apexcharts-card        → HACS: apexcharts-card
#   - custom:mushroom-template-card → HACS: Mushroom
#   - custom:bar-card               → HACS: bar-card
#   (ezek hiányában a sima entities/glance/gauge kártyák is működnek)
#
# =============================================================================

title: "⚡ E.ON Villanyóra"
views:

  # ===========================================================================
  # 1. FŐOLDAL – Áttekintő
  # ===========================================================================
  - title: "Áttekintő"
    icon: mdi:lightning-bolt
    cards:

      # ─── FEJLÉC – STATUS CHIP-EK (Mushroom chips) ───────────────────────────
      - type: custom:mushroom-chips-card
        chips:
          - type: entity
            entity: sensor.e_on_meter_unknown_api_imap_status
            icon: mdi:check-network
            icon_color: green
          - type: entity
            entity: sensor.e_on_meter_unknown_utolso_lekerdezes
            icon: mdi:clock-sync-outline
          - type: entity
            entity: sensor.e_on_meter_unknown_utolso_adat_idobelyege
            icon: mdi:database-clock-outline

      # ─── JELENLEGI NAP – GYORS ÁTTEKINTŐ ────────────────────────────────────
      - type: custom:mushroom-template-card
        primary: "Napi nettó egyenleg"
        secondary: "{{ states('sensor.e_on_meter_unknown_napi_netto_egyenleg') | float(0) | round(2) }} kWh"
        icon: |
          {% set val = states('sensor.e_on_meter_unknown_napi_netto_egyenleg') | float(0) %}
          {% if val < 0 %}mdi:solar-power{% elif val > 0 %}mdi:transmission-tower-import{% else %}mdi:scale-balance{% endif %}
        icon_color: |
          {% set val = states('sensor.e_on_meter_unknown_napi_netto_egyenleg') | float(0) %}
          {% if val < 0 %}green{% elif val > 0 %}orange{% else %}blue{% endif %}
        badge_icon: mdi:currency-usd
        badge_color: amber
        fill_container: false

      # ─── 4 FÓKUSZKÁRTYA – ma legfontosabb 4 szám ────────────────────────────
      - type: glance
        title: "Mai adatok"
        show_name: true
        show_icon: true
        show_state: true
        entities:
          - entity: sensor.e_on_meter_unknown_import_daily
            name: "Import"
            icon: mdi:transmission-tower-import
          - entity: sensor.e_on_meter_unknown_export_daily
            name: "Export"
            icon: mdi:solar-power-variant
          - entity: sensor.e_on_meter_unknown_napi_csucsterteles
            name: "Csúcs"
            icon: mdi:lightning-bolt-circle
          - entity: sensor.e_on_meter_unknown_becsult_napi_koltseg
            name: "Költség"
            icon: mdi:cash

      # ─── ÖNELLÁTÁSI ARÁNY – GAUGE ────────────────────────────────────────────
      - type: gauge
        title: "Önellátási Arány"
        entity: sensor.e_on_meter_unknown_onellatassi_arany
        unit: "%"
        min: 0
        max: 100
        needle: true
        severity:
          green: 60
          yellow: 30
          red: 0

      # ─── MINI-GRAPH – Import vs Export napi trend (7 nap) ────────────────────
      - type: custom:mini-graph-card
        title: "Import / Export – 7 napos trend"
        icon: mdi:chart-line
        hours_to_show: 168
        points_per_hour: 0.04
        line_width: 2
        smoothing: true
        show:
          labels: false
          points: false
          legend: true
          fill: true
        entities:
          - entity: sensor.e_on_meter_unknown_import_daily
            name: "Import (napi)"
            color: "#e74c3c"
          - entity: sensor.e_on_meter_unknown_export_daily
            name: "Export (napi)"
            color: "#2ecc71"

      # ─── MINI-GRAPH – Napi Nettó Egyenleg trend ──────────────────────────────
      - type: custom:mini-graph-card
        title: "Napi Nettó Egyenleg – 14 nap"
        icon: mdi:scale-balance
        hours_to_show: 336
        points_per_hour: 0.03
        line_width: 2
        smoothing: true
        color_thresholds:
          - value: -999
            color: "#2ecc71"
          - value: 0
            color: "#e74c3c"
        show:
          fill: true
          extrema: true
          labels: true
          legend: false
        entities:
          - entity: sensor.e_on_meter_unknown_napi_netto_egyenleg
            name: "Nettó egyenleg"

  # ===========================================================================
  # 2. HAVI / HETI ÖSSZESÍTŐ
  # ===========================================================================
  - title: "Havi / Heti"
    icon: mdi:calendar-month
    cards:

      # ─── STATISZTIKA OSZLOPDIAGRAM – havi import/export ──────────────────────
      - type: statistics-graph
        title: "Havi Import vs Export"
        chart_type: bar
        period: month
        stat_types:
          - max
        entities:
          - entity: sensor.e_on_meter_unknown_import_monthly
            name: "Import (havi)"
          - entity: sensor.e_on_meter_unknown_export_monthly
            name: "Export (havi)"

      # ─── STATISZTIKA VONALDIAGRAM – heti összesítők ──────────────────────────
      - type: statistics-graph
        title: "Heti Import / Export"
        chart_type: line
        period: week
        stat_types:
          - max
        entities:
          - entity: sensor.e_on_meter_unknown_import_weekly
            name: "Import (heti)"
          - entity: sensor.e_on_meter_unknown_export_weekly
            name: "Export (heti)"

      # ─── SUMMING TABLE kártya (entities) ─────────────────────────────────────
      - type: entities
        title: "Összesítő adatok"
        show_header_toggle: false
        entities:
          - entity: sensor.e_on_meter_unknown_import_daily
            name: "Import – ma"
            icon: mdi:transmission-tower-import
          - entity: sensor.e_on_meter_unknown_export_daily
            name: "Export – ma"
            icon: mdi:solar-power-variant
          - type: divider
          - entity: sensor.e_on_meter_unknown_import_weekly
            name: "Import – ezen a héten"
          - entity: sensor.e_on_meter_unknown_export_weekly
            name: "Export – ezen a héten"
          - type: divider
          - entity: sensor.e_on_meter_unknown_import_monthly
            name: "Import – ebben a hónapban"
          - entity: sensor.e_on_meter_unknown_export_monthly
            name: "Export – ebben a hónapban"
          - type: divider
          - entity: sensor.e_on_meter_unknown_becsult_napi_koltseg
            name: "Becsült napi költség"
            icon: mdi:cash-clock

      # ─── APEXCHARTS – Import vs Export oszlopdiagram (ha telepítve) ──────────
      - type: custom:apexcharts-card
        header:
          show: true
          title: "Import vs Export – heti összehasonlítás"
          show_states: true
          colorize_states: true
        chart_type: bar
        span:
          start: week
        series:
          - entity: sensor.e_on_meter_unknown_import_weekly
            name: "Import kWh"
            color: "#e74c3c"
            type: column
          - entity: sensor.e_on_meter_unknown_export_weekly
            name: "Export kWh"
            color: "#2ecc71"
            type: column

  # ===========================================================================
  # 3. MÉRŐÓRA ÁLLÁSOK
  # ===========================================================================
  - title: "Mérőóra"
    icon: mdi:meter-electric
    cards:

      # ─── MÉRŐÓRA ÖSSZES ÁLLÁS ────────────────────────────────────────────────
      - type: entities
        title: "Mérőóra Állások (OBIS)"
        show_header_toggle: false
        entities:
          - entity: sensor.e_on_meter_unknown_merooora_import_allas
            name: "Import állás"
            icon: mdi:counter
          - entity: sensor.e_on_meter_unknown_merooora_export_allas
            name: "Export állás"
            icon: mdi:counter
          - type: divider
          - entity: sensor.e_on_meter_unknown_merooora_t1_import_allas
            name: "T1 Import állás"
            icon: mdi:numeric-1-circle-outline
          - entity: sensor.e_on_meter_unknown_merooora_t2_import_allas
            name: "T2 Import állás"
            icon: mdi:numeric-2-circle-outline

      # ─── MINI-GRAPH – Kumulatív import mérőóra állás ─────────────────────────
      - type: custom:mini-graph-card
        title: "Mérőóra Import Állás – trend"
        icon: mdi:counter
        hours_to_show: 720
        points_per_hour: 0.02
        line_width: 2
        show:
          fill: false
          extrema: true
          labels: false
        entities:
          - entity: sensor.e_on_meter_unknown_merooora_import_allas
            name: "Import (kumulatív)"
            color: "#e74c3c"
          - entity: sensor.e_on_meter_unknown_merooora_export_allas
            name: "Export (kumulatív)"
            color: "#2ecc71"

      # ─── BAR-CARD – Csúcsteljesítmény T1/T2 ─────────────────────────────────
      - type: custom:bar-card
        title: "Csúcsteljesítmény"
        columns: 1
        entities:
          - entity: sensor.e_on_meter_unknown_csucsteljesitmeny_t1
            name: "T1 Csúcsteljesítmény"
            color: "#3498db"
            max: 15
          - entity: sensor.e_on_meter_unknown_csucsteljesitmeny_t2
            name: "T2 Csúcsteljesítmény"
            color: "#9b59b6"
            max: 15

  # ===========================================================================
  # 4. DIAGNOSZTIKA
  # ===========================================================================
  - title: "Diagnosztika"
    icon: mdi:tools
    cards:

      # ─── STÁTUSZ KÁRTYA ───────────────────────────────────────────────────────
      - type: entities
        title: "Rendszer Állapot"
        show_header_toggle: false
        entities:
          - entity: sensor.e_on_meter_unknown_api_imap_status
            name: "API/IMAP Státusz"
            icon: mdi:check-network
          - entity: sensor.e_on_meter_unknown_utolso_lekerdezes
            name: "Utolsó lekérdezés"
            icon: mdi:clock-outline
          - entity: sensor.e_on_meter_unknown_utolso_adat_idobelyege
            name: "Utolsó adat időbélyege"
            icon: mdi:database-clock-outline
          - entity: sensor.e_on_meter_unknown_last_outage
            name: "Utolsó kiesés"
            icon: mdi:alert-circle-outline

      # ─── MINI-GRAPH – Önellátási arány 30 nap ────────────────────────────────
      - type: custom:mini-graph-card
        title: "Önellátási Arány – 30 nap"
        icon: mdi:percent
        hours_to_show: 720
        points_per_hour: 0.02
        line_width: 2
        lower_bound: 0
        upper_bound: 100
        show:
          fill: true
          extrema: true
          labels: false
          legend: false
        color_thresholds:
          - value: 0
            color: "#e74c3c"
          - value: 40
            color: "#f39c12"
          - value: 70
            color: "#2ecc71"
        entities:
          - entity: sensor.e_on_meter_unknown_onellatassi_arany
            name: "Önellátási arány %"

      # ─── REAKTÍV ENERGIA ─────────────────────────────────────────────────────
      - type: entities
        title: "Reaktív energia (napi)"
        show_header_toggle: false
        entities:
          - entity: sensor.e_on_meter_unknown_import_reaktiv_daily
            name: "Import reaktív"
            icon: mdi:sine-wave
          - entity: sensor.e_on_meter_unknown_export_reaktiv_daily
            name: "Export reaktív"
            icon: mdi:sine-wave

      # ─── NAPI FOGYASZTÁS BONTÁS (attribútumok megjelenítése) ─────────────────
      - type: entities
        title: "Napi Fogyasztás Bontás"
        show_header_toggle: false
        entities:
          - entity: sensor.e_on_meter_unknown_napi_fogyasztas_bontas
            name: "Napi bontás összesítő"
            icon: mdi:table

# =============================================================================
# MEGJEGYZÉSEK:
#
# 1. Az entity ID-kban az "unknown" rész helyére a TE POD azonosítód kerül,
#    pl: hu0001234567 → sensor.e_on_meter_hu0001234567_import_daily
#    A tényleges ID-kat lásd:
#    Settings → Devices & Services → E.ON Meter → Entities
#
# 2. Ha a special karakteres entitások (önellátás, csúcs stb.) más névvel
#    jelennek meg, a HA az ékezeteket eltávolítja a slug-ban:
#    "Önellátási Arány" → onellatasi_arany
#    "Csúcsteljesítmény T1" → csucsteljesitmeny_t1
#
# 3. HACS kiegészítők telepítése nélkül cseréld a custom: kártyákat:
#    custom:mini-graph-card  → statistics-graph (type: line)
#    custom:apexcharts-card  → statistics-graph (type: bar)
#    custom:mushroom-*       → elhagyható
#    custom:bar-card         → gauge (külön-külön)
# =============================================================================
